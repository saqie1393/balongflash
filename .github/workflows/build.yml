name: Build Balong Flash with Auto Headers

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install MinGW
        run: sudo apt-get install -y mingw-w64
        
      - name: Auto-detect and create missing headers
        run: |
          # Get all includes from balong_flash.c
          INCLUDES=$(grep "^#include \"" balong_flash.c | sed 's/#include "//' | sed 's/"//')
          
          # Create each missing header
          for header in $INCLUDES; do
            if [ ! -f "$header" ]; then
              echo "Creating missing header: $header"
              cat > "$header" << 'EOF'
          #ifndef AUTO_CREATED_HEADER
          #define AUTO_CREATED_HEADER
          /* Auto-generated header to satisfy build dependencies */
          #define DUMMY_VALUE 1
          #endif
          EOF
            else
              echo "Header exists: $header"
            fi
          done
          
      - name: Display all headers
        run: |
          echo "=== All header files in repository ==="
          find . -name "*.h" -type f
          
      - name: Build
        run: |
          test -f build || echo "1" > build
          make CC=x86_64-w64-mingw32-gcc CFLAGS="-O2 -I." || {
            echo "Build failed. Checking compilation command..."
            exit 1
          }
          
      - name: Package
        run: |
          [ -f balong_flash ] && mv balong_flash balong_flash.exe
          [ -f balong_flash.exe ] && echo "Success!" || exit 1
          
      - uses: actions/upload-artifact@v4
        with:
          name: balong-flash
          path: balong_flash.exe

name: Build Balong Flash for Windows

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install MinGW64
        run: sudo apt-get update && sudo apt-get install -y mingw-w64
        
      - name: Create missing printf.h header
        run: echo "#include <stdio.h>" > printf.h
        
      - name: Create build file
        run: |
          if [ ! -f build ]; then
            echo "1" > build
          fi
          
      - name: Build executable for Windows
        run: make CC=x86_64-w64-mingw32-gcc LIBS="-lz" CFLAGS="-O2 -I."
        
      - name: Rename to .exe
        run: mv balong_flash balong_flash.exe || echo "File already renamed"
        
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: balong_flash_windows
          path: balong_flash.exe
          if-no-files-found: error

name: Build Balong Flash for Windows x64

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install MinGW64
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64
        
    - name: Create build file
      run: |
        if [ ! -f build ]; then echo "1" > build; fi
        
    - name: Build for Windows x64
      run: |
        make CC=x86_64-w64-mingw32-gcc \
             LIBS="-lz" \
             CFLAGS="-O2 -Wunused -Wno-unused-result -D BUILDNO=$(cat build) -D_7ZIP_ST"
             
    - name: Rename to .exe
      run: mv balong_flash balong_flash.exe
      
    - name: Verify executable
      run: |
        file balong_flash.exe
        x86_64-w64-mingw32-objdump -p balong_flash.exe | grep "DLL Name" || true
        
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: balong_flash_windows_x64
        path: balong_flash.exe
